<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Live Converter Tool</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 100vh;
  background: #0b0b0f;
  color: white;
}

.left {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-right: 1px solid #222;
}

textarea {
  height: 30%;
  background: #111;
  color: #0ff;
  border: none;
  padding: 10px;
  outline: none;
  resize: none;
}

textarea:focus {
  border: 1px solid #6366f1;
}

.right {
  position: relative;
  display: flex;
  flex-direction: column;
}

iframe {
  flex: 1;
  border: none;
  background: white;
}

pre {
  height: 40%;
  margin: 0;
  padding: 10px;
  background: #111;
  color: #0f0;
  overflow: auto;
  cursor: pointer;
}

.clear-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 10;
  padding: 8px 12px;
  background: #ff003c;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
  font-size: 12px;
  transition: 0.2s;
}

.clear-btn:hover {
  background: #ff3366;
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
  <textarea id="html" placeholder="HTML (click to paste)"></textarea>
  <textarea id="css" placeholder="CSS (click to paste)"></textarea>
  <textarea id="js" placeholder="JS (click to paste)"></textarea>
</div>

<!-- RIGHT -->
<div class="right">

  <button class="clear-btn" onclick="clearAll()">CLEAR</button>

  <iframe id="preview"></iframe>
  <pre id="output">Click to copy JSON</pre>

</div>

<script>

// paste on click
async function enablePaste(id) {
  const el = document.getElementById(id);
  el.addEventListener("click", async () => {
    try {
      const text = await navigator.clipboard.readText();
      el.value = text;
      update();
    } catch {}
  });
}

enablePaste("html");
enablePaste("css");
enablePaste("js");

// build preview
function build(html, css, js) {
  return `
<!DOCTYPE html>
<html>
<head>
<style>${css}</style>
</head>
<body>
${html}
<script>${js}<\/script>
</body>
</html>`;
}

// live update
function update() {
  const html = document.getElementById("html").value;
  const css = document.getElementById("css").value;
  const js = document.getElementById("js").value;

  document.getElementById("preview").srcdoc = build(html, css, js);

  const output = {
    id: "test-button",
    name: "Test Button",
    category: "Buttons",
    tags: ["test", "ui"],
    html: "`" + html + "`",
    css: "`" + css + "`",
    js: "`" + js + "`",
    authorId: "system",
    createdAt: new Date().toISOString()
  };

  // 🔥 comma added here
  document.getElementById("output").textContent =
    JSON.stringify(output, null, 2) + ",";
}

// typing update
document.querySelectorAll("textarea").forEach(t => {
  t.addEventListener("input", update);
});

// copy output (no alert)
document.getElementById("output").addEventListener("click", () => {
  navigator.clipboard.writeText(
    document.getElementById("output").textContent
  );
});

// clear all
function clearAll() {
  document.getElementById("html").value = "";
  document.getElementById("css").value = "";
  document.getElementById("js").value = "";
  update();
}

// init
update();

</script>

</body>
</html>
